# Rendered by envsubst at container start — do not edit manually
# Blue/Green deployment (CI/CD changes ports):
#   API  - blue: 8080, green: 8082
#   Chat - blue: 8081, green: 8083

upstream backend_api {
    server $API_IP:8080;
}

upstream backend_chat {
    server $CHAT_IP:8081;
}

upstream ai {
    server $AI_IP:8000;
}

upstream frontend {
    server $FRONT_IP:3000;
}
