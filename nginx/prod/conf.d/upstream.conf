# Rendered by Terraform templatefile() — do not edit manually
# Blue/Green deployment (CI/CD changes ports):
#   API  - blue: 8080, green: 8082
#   Chat - blue: 8081, green: 8083

upstream backend_api {
    server ${api_ip}:8080;
}

upstream backend_chat {
    server ${chat_ip}:8081;
}

upstream ai {
    server ${ai_ip}:8000;
}

upstream frontend {
    server ${front_ip}:3000;
}