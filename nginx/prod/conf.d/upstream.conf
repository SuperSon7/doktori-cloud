# Rendered by envsubst at container start — do not edit manually
# Blue/Green deployment (CI/CD changes ports):
#   API  - blue: 8080, green: 8082
#   Chat - blue: 8081, green: 8083

upstream backend_api {
    server api.$INTERNAL_DOMAIN:8080;
}

upstream backend_chat {
    server chat.$INTERNAL_DOMAIN:8081;
}

upstream ai {
    server ai.$INTERNAL_DOMAIN:8000;
}

upstream frontend {
    server front.$INTERNAL_DOMAIN:3000;
}
