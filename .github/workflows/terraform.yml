name: Terraform

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'infracost.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  schedule:
    # Drift 감지 — 매일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * *'

# concurrency는 각 job 레벨에서 state key 기준으로 설정한다

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: "1.14.8"
  APPLY_DISABLED: "true"  # TEMPORARY: 대량 변경 검증 완료 후 제거

jobs:
  # -------------------------------------------------------
  # Detect which layers changed
  # -------------------------------------------------------
  detect-changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      env-matrix: ${{ steps.set-matrix.outputs.env_matrix }}
      shared-matrix: ${{ steps.set-matrix.outputs.shared_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
            if [ -n "$MERGE_BASE" ]; then
              CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
            else
              CHANGED=$(git diff --name-only HEAD~1)
            fi
          fi

          # --- Environment layers ---
          ENV_LAYERS=()
          CHANGED_MODULES=$(echo "$CHANGED" | grep '^terraform/modules/' | cut -d'/' -f3 | sort -u)

          for layer in dev/base dev/data dev/app staging/base staging/data staging/app staging/loadtest prod/base prod/data prod/app prod/cdn loadtest; do
            LAYER_DIR="terraform/environments/${layer}"
            [ -d "$LAYER_DIR" ] || continue

            if echo "$CHANGED" | grep -q "^${LAYER_DIR}/"; then
              ENV_LAYERS+=("$layer")
              continue
            fi

            if [ -n "$CHANGED_MODULES" ]; then
              for mod in $CHANGED_MODULES; do
                if grep -rq "modules/${mod}" "$LAYER_DIR"/ 2>/dev/null; then
                  ENV_LAYERS+=("$layer")
                  break
                fi
              done
            fi
          done

          ENV_LAYERS=($(printf '%s\n' "${ENV_LAYERS[@]}" | sort -u))

          # --- Shared layers ---
          SHARED_LAYERS=()
          for layer in global ecr dns_zone monitoring/base monitoring/data monitoring/app; do
            if echo "$CHANGED" | grep -q "^terraform/${layer}/"; then
              SHARED_LAYERS+=("$layer")
            fi
          done

          # Output
          if [ ${#ENV_LAYERS[@]} -eq 0 ]; then
            echo "env_matrix={\"layer\":[]}" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${ENV_LAYERS[@]}" | jq -R . | jq -sc '{"layer": .}')
            echo "env_matrix=${JSON}" >> "$GITHUB_OUTPUT"
          fi

          if [ ${#SHARED_LAYERS[@]} -eq 0 ]; then
            echo "shared_matrix={\"layer\":[]}" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SHARED_LAYERS[@]}" | jq -R . | jq -sc '{"layer": .}')
            echo "shared_matrix=${JSON}" >> "$GITHUB_OUTPUT"
          fi

          echo "Env layers: ${ENV_LAYERS[*]:-none}"
          echo "Shared layers: ${SHARED_LAYERS[*]:-none}"

  # -------------------------------------------------------
  # Format check (on PR)
  # -------------------------------------------------------
  fmt:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

  # -------------------------------------------------------
  # Validate — changed layers (on PR)
  # -------------------------------------------------------
  validate:
    needs: detect-changes
    if: github.event_name == 'pull_request' && (needs.detect-changes.outputs.env-matrix != '{"layer":[]}' || needs.detect-changes.outputs.shared-matrix != '{"layer":[]}')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Validate env layers
        if: needs.detect-changes.outputs.env-matrix != '{"layer":[]}'
        run: |
          echo '${{ needs.detect-changes.outputs.env-matrix }}' | jq -r '.layer[]' | while read layer; do
            echo "=== Validating environments/${layer} ==="
            terraform -chdir="terraform/environments/${layer}" init -backend=false
            terraform -chdir="terraform/environments/${layer}" validate
          done

      - name: Validate shared layers
        if: needs.detect-changes.outputs.shared-matrix != '{"layer":[]}'
        run: |
          echo '${{ needs.detect-changes.outputs.shared-matrix }}' | jq -r '.layer[]' | while read layer; do
            echo "=== Validating ${layer} ==="
            terraform -chdir="terraform/${layer}" init -backend=false
            terraform -chdir="terraform/${layer}" validate
          done

  # -------------------------------------------------------
  # Security scan (on PR)
  # -------------------------------------------------------
  tfsec:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: terraform
          soft_fail: true

  # -------------------------------------------------------
  # Plan — environment layers (on PR)
  # -------------------------------------------------------
  plan:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.env-matrix != '{"layer":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.env-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.layer }}
        run: terraform init -backend-config=../../../backend.hcl

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.layer }}
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Detect destroy
        id: destroy-check
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform/environments/${{ matrix.layer }}
        run: |
          if terraform show -no-color tfplan | grep -q 'will be destroyed'; then
            echo "has_destroy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_destroy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.layer }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const hasDestroy = '${{ steps.destroy-check.outputs.has_destroy }}' === 'true';
            const warning = hasDestroy ? '\n\n> **Warning: This plan contains resource destruction!**' : '';

            const body = `### Terraform Plan: \`${{ matrix.layer }}\`${warning}
            \`\`\`
            ${truncated}
            \`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Plan failed
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # -------------------------------------------------------
  # Plan — shared layers (on PR)
  # -------------------------------------------------------
  plan-shared:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.shared-matrix != '{"layer":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.shared-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/${{ matrix.layer }}
        run: terraform init -backend-config=../backend.hcl

      - name: Terraform Plan
        id: plan
        working-directory: terraform/${{ matrix.layer }}
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Detect destroy
        id: destroy-check
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform/${{ matrix.layer }}
        run: |
          if terraform show -no-color tfplan | grep -q 'will be destroyed'; then
            echo "has_destroy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_destroy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/${{ matrix.layer }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const hasDestroy = '${{ steps.destroy-check.outputs.has_destroy }}' === 'true';
            const warning = hasDestroy ? '\n\n> **Warning: This plan contains resource destruction!**' : '';

            const body = `### Terraform Plan: \`${{ matrix.layer }}\` (shared)${warning}
            \`\`\`
            ${truncated}
            \`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Plan failed
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # -------------------------------------------------------
  # Infracost (on PR)
  # -------------------------------------------------------
  infracost:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.env-matrix != '{"layer":[]}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Infracost baseline
        run: |
          infracost breakdown \
            --config-file=base/infracost.yml \
            --format=json \
            --out-file=/tmp/infracost-base.json
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Infracost diff
        run: |
          infracost diff \
            --config-file=infracost.yml \
            --format=json \
            --compare-to=/tmp/infracost-base.json \
            --out-file=/tmp/infracost-diff.json

      - name: Post PR comment
        run: |
          infracost comment github \
            --path=/tmp/infracost-diff.json \
            --repo=${{ github.repository }} \
            --github-token=${{ github.token }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update

  # -------------------------------------------------------
  # Apply — global (on merge)
  # -------------------------------------------------------
  apply-global:
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPLY_DISABLED != 'true'
    runs-on: ubuntu-latest
    environment: terraform-shared
    concurrency:
      group: terraform-global
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if changed
        id: check
        run: |
          MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$MERGE_BASE" ]; then
            CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "should_apply=$(echo "$CHANGED" | grep -q '^terraform/global/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/global
        run: terraform init -backend-config=../backend.hcl

      - name: Terraform Plan & Apply
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/global
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXITCODE=$?
          set -e
          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
            terraform apply tfplan
            bash ../scripts/assert-clean-plan.sh
          fi

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: global\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # -------------------------------------------------------
  # Apply — ecr + dns_zone (on merge, after global)
  # -------------------------------------------------------
  apply-shared:
    needs: [detect-changes, apply-global]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPLY_DISABLED != 'true'
    runs-on: ubuntu-latest
    environment: terraform-shared
    concurrency:
      group: terraform-${{ matrix.layer }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: ecr
            dir: terraform/ecr
          - layer: dns_zone
            dir: terraform/dns_zone
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if changed
        id: check
        run: |
          MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$MERGE_BASE" ]; then
            CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "should_apply=$(echo "$CHANGED" | grep -q '^${{ matrix.dir }}/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        if: steps.check.outputs.should_apply == 'true'
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend-config=../backend.hcl

      - name: Terraform Plan & Apply
        if: steps.check.outputs.should_apply == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXITCODE=$?
          set -e
          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
            terraform apply tfplan
            bash ../scripts/assert-clean-plan.sh
          fi

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: ${{ matrix.layer }}\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # -------------------------------------------------------
  # Apply — monitoring/base (on merge, after ecr/dns_zone)
  # -------------------------------------------------------
  apply-monitoring-base:
    needs: [detect-changes, apply-shared]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPLY_DISABLED != 'true'
    runs-on: ubuntu-latest
    environment: terraform-shared
    concurrency:
      group: terraform-monitoring-base
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if changed
        id: check
        run: |
          MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$MERGE_BASE" ]; then
            CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "should_apply=$(echo "$CHANGED" | grep -q '^terraform/monitoring/base/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/base
        run: terraform init -backend-config=../../backend.hcl

      - name: Terraform Plan & Apply
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/base
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXITCODE=$?
          set -e
          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
            terraform apply tfplan
            bash ../../scripts/assert-clean-plan.sh
          fi

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: monitoring/base\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # -------------------------------------------------------
  # Apply — monitoring/data (on merge, after monitoring/base)
  # -------------------------------------------------------
  apply-monitoring-data:
    needs: [detect-changes, apply-monitoring-base]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPLY_DISABLED != 'true'
    runs-on: ubuntu-latest
    environment: terraform-shared
    concurrency:
      group: terraform-monitoring-data
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if changed
        id: check
        run: |
          MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$MERGE_BASE" ]; then
            CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "should_apply=$(echo "$CHANGED" | grep -q '^terraform/monitoring/data/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/data
        run: terraform init -backend-config=../../backend.hcl

      - name: Terraform Plan & Apply
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/data
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXITCODE=$?
          set -e
          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
            terraform apply tfplan
            bash ../../scripts/assert-clean-plan.sh
          fi

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: monitoring/data\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # -------------------------------------------------------
  # Apply — monitoring/app (on merge, after monitoring/data)
  # -------------------------------------------------------
  apply-monitoring-app:
    needs: [detect-changes, apply-monitoring-data]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.APPLY_DISABLED != 'true'
    runs-on: ubuntu-latest
    environment: terraform-shared
    concurrency:
      group: terraform-monitoring-app
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if changed
        id: check
        run: |
          MERGE_BASE=$(git log --merges -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$MERGE_BASE" ]; then
            CHANGED=$(git diff --name-only "${MERGE_BASE}^1"..."${MERGE_BASE}")
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi
          echo "should_apply=$(echo "$CHANGED" | grep -q '^terraform/monitoring/app/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/app
        run: terraform init -backend-config=../../backend.hcl

      - name: Terraform Plan & Apply
        if: steps.check.outputs.should_apply == 'true'
        working-directory: terraform/monitoring/app
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXITCODE=$?
          set -e
          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
            terraform apply tfplan
            bash ../../scripts/assert-clean-plan.sh
          fi

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: monitoring/app\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
