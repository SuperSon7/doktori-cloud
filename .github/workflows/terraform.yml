          if [ $EXITCODE -eq 1 ]; then exit 1; fi
          if [ $EXITCODE -eq 2 ]; then
            if terraform show -json tfplan | jq -e '.resource_changes[] | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "::error::Plan contains resource deletion/replacement — aborting"
              exit 1
            fi
          fi

      - name: Terraform Apply
        if: steps.check.outputs.should_apply == 'true' && steps.plan.outputs.exitcode == '2'
        working-directory: terraform/environments/${{ matrix.layer }}
        run: |
          terraform apply tfplan
          bash ../../../scripts/assert-clean-plan.sh

      - name: Notify Discord
        if: always() && steps.check.outputs.should_apply == 'true'
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}"
          COLOR="${{ job.status == 'success' && '3066993' || '15158332' }}"
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Terraform ${STATUS}: ${{ matrix.layer }}\",\"description\":\"by ${{ github.actor }}\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":${COLOR}}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # -------------------------------------------------------
  # Drift detection (scheduled)
  # -------------------------------------------------------
  drift:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: global
            dir: terraform/global
            backend: ../backend.hcl
          - layer: ecr
            dir: terraform/ecr
            backend: ../backend.hcl
          - layer: dns_zone
            dir: terraform/dns_zone
            backend: ../backend.hcl
          - layer: monitoring/base
            dir: terraform/monitoring/base
            backend: ../../backend.hcl
          - layer: monitoring/data
            dir: terraform/monitoring/data
            backend: ../../backend.hcl
          - layer: monitoring/app
            dir: terraform/monitoring/app
            backend: ../../backend.hcl
          - layer: dev/base
            dir: terraform/environments/dev/base
            backend: ../../../backend.hcl
          - layer: dev/data
            dir: terraform/environments/dev/data
            backend: ../../../backend.hcl
          - layer: dev/app
            dir: terraform/environments/dev/app
            backend: ../../../backend.hcl
          - layer: staging/base
            dir: terraform/environments/staging/base
            backend: ../../../backend.hcl
          - layer: staging/data
            dir: terraform/environments/staging/data
            backend: ../../../backend.hcl
          - layer: staging/app
            dir: terraform/environments/staging/app
            backend: ../../../backend.hcl
          - layer: staging/loadtest
            dir: terraform/environments/staging/loadtest
            backend: ../../../backend.hcl
          - layer: prod/base
            dir: terraform/environments/prod/base
            backend: ../../../backend.hcl
          - layer: prod/data
            dir: terraform/environments/prod/data
            backend: ../../../backend.hcl
          - layer: prod/app
            dir: terraform/environments/prod/app
            backend: ../../../backend.hcl
          - layer: prod/cdn
            dir: terraform/environments/prod/cdn
            backend: ../../../backend.hcl
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend-config=${{ matrix.backend }}

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: ${{ matrix.dir }}
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Notify drift
        if: steps.plan.outputs.exitcode == '2'
        run: |
          DRIFT=$(head -100 ${{ matrix.dir }}/plan.txt)
          curl -sfS -o /dev/null -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Drift detected: ${{ matrix.layer }}\",\"description\":\"콘솔 수동 변경 감지. 확인 필요.\",\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":15105570}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
