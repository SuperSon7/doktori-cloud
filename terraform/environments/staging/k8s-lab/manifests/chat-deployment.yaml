apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: prod
  labels:
    app: doktori
    component: chat
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: doktori
      component: chat
  template:
    metadata:
      labels:
        app: doktori
        component: chat
    spec:
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 30
      containers:
        - name: chat
          image: 250857930609.dkr.ecr.ap-northeast-2.amazonaws.com/doktori/backend-chat@sha256:99400f737cf529f104ddb1ed057974e7d89e238b96f9c48ce8b83962896cfb4a
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: chat-config
            - secretRef:
                name: chat-secret
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]