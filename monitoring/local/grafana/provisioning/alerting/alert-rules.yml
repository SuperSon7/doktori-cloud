apiVersion: 1

groups:
  # =========================================================================
  # Infrastructure — 인프라 장애 감지 (prod + prod-k8s)
  # =========================================================================
  - orgId: 1
    name: Infrastructure
    folder: Infrastructure
    interval: 1m
    rules:
      # --- Service Down (critical) ---
      # Blue/Green 배포 환경: 비활성 슬롯(up=0)은 정상이므로
      # max by()로 같은 앱의 슬롯 중 하나라도 up이면 OK
      - uid: service_down
        title: Service Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: max by (app, env, job) (up{env=~"prod|prod-k8s", app=~".+"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "{{ or $labels.app $labels.job }}({{ $labels.env }}) 서비스가 다운됨"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ or $labels.app $labels.job }}&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/service-down.md"
          action: "prod: docker ps → 로그 확인 → 재시작 / prod-k8s: kubectl get pods -n prod → kubectl logs -n prod"
        noDataState: OK
        execErrState: Alerting

      # --- Probe Failure (critical) ---
      - uid: probe_failure
        title: Probe Failure
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: probe_success{env=~"prod|prod-k8s"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} 외부 프로브 실패"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          action: "1) 대상 서비스 헬스체크 수동 확인 (curl)  2) 네트워크/DNS 문제 여부 확인  3) 서비스 다운 알림과 함께 발생했는지 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Error Rate > 50% (critical) ---
      - uid: error_rate_critical
        title: "Error Rate > 50%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum by (app, env) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", status=~"5.."}[5m]))
                /
                sum by (app, env) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.app }}({{ $labels.env }}) 에러율 50% 초과"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ $labels.app }}&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/error-rate-critical.md"
          action: "1) 로그 대시보드에서 에러 로그 확인  2) 에러 집중 API 엔드포인트 특정  3) traceId로 요청 흐름 추적"
        noDataState: OK
        execErrState: Alerting

      # --- Disk > 95% (critical) ---
      - uid: disk_critical
        title: "Disk > 95%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                1 - (
                  node_filesystem_avail_bytes{env=~"prod|prod-k8s", fstype!~"tmpfs|overlay", mountpoint!~"/etc/.*|/var/log|/var/lib/alloy.*|/run/.*|/boot/efi"}
                  /
                  node_filesystem_size_bytes{env=~"prod|prod-k8s", fstype!~"tmpfs|overlay", mountpoint!~"/etc/.*|/var/log|/var/lib/alloy.*|/run/.*|/boot/efi"}
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.95]
              refId: C
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} 디스크 95% 초과 ({{ $labels.mountpoint }})"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          action: "1) du -sh /var/lib/docker /var/log 대용량 확인  2) docker system prune / crictl rmi 미사용 이미지 정리  3) 디스크 증설 검토"
        noDataState: OK
        execErrState: Alerting

      # --- Memory > 90% (high) ---
      - uid: memory_high
        title: "Memory > 90%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                1 - node_memory_MemAvailable_bytes{env=~"prod|prod-k8s"} / node_memory_MemTotal_bytes{env=~"prod|prod-k8s"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.9]
              refId: C
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} 메모리 90% 초과"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          action: "prod: cAdvisor로 컨테이너 메모리 확인 / prod-k8s: kubectl top pods -n prod → OOM 위험 Pod 특정 → limit 조정 또는 스케일아웃"
        noDataState: OK
        execErrState: Alerting

      # --- CPU > 80% (warning) ---
      - uid: cpu_high
        title: "CPU > 80%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                1 - avg by (instance) (rate(node_cpu_seconds_total{env=~"prod|prod-k8s", mode="idle"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 5m
        keep_firing_for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU 80% 초과"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          action: "prod: cAdvisor CPU 확인 / prod-k8s: kubectl top pods -n prod → 과부하 Pod 특정 → 일시적 스파이크 vs 지속 부하 판단"
        noDataState: OK
        execErrState: Alerting

      # --- Disk > 80% (warning) ---
      - uid: disk_warning
        title: "Disk > 80%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                1 - (
                  node_filesystem_avail_bytes{env=~"prod|prod-k8s", fstype!~"tmpfs|overlay", mountpoint!~"/etc/.*|/var/log|/var/lib/alloy.*|/run/.*|/boot/efi"}
                  /
                  node_filesystem_size_bytes{env=~"prod|prod-k8s", fstype!~"tmpfs|overlay", mountpoint!~"/etc/.*|/var/log|/var/lib/alloy.*|/run/.*|/boot/efi"}
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 10m
        keep_firing_for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 디스크 80% 초과 ({{ $labels.mountpoint }})"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          action: "1) du -sh 대용량 디렉토리 확인  2) docker system prune / crictl rmi 미사용 이미지 정리  3) 95% 도달 전 선제 대응"
        noDataState: OK
        execErrState: Alerting

  # =========================================================================
  # Application — 앱 레벨 이상 감지 (prod + prod-k8s)
  # =========================================================================
  - orgId: 1
    name: Application
    folder: Application
    interval: 1m
    rules:
      # --- Error Rate > 10% (high) ---
      - uid: error_rate_high
        title: "Error Rate > 10%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum by (app, env) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", status=~"5.."}[5m]))
                /
                sum by (app, env) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
              refId: C
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.app }}({{ $labels.env }}) 에러율 10% 초과"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ or $labels.app $labels.application }}&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          action: "1) 로그 대시보드에서 에러 로그 확인  2) 에러 집중 API 엔드포인트 특정  3) traceId로 요청 흐름 추적"
        noDataState: OK
        execErrState: Alerting

      # --- p99 > 5s (high) ---
      - uid: p99_high
        title: "p99 Latency > 5s"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.99,
                  sum by (le, app, env) (
                    rate(http_server_requests_seconds_bucket{env=~"prod|prod-k8s", outcome="SUCCESS"}[5m])
                  )
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
              refId: C
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.app }}({{ $labels.env }}) p99 지연시간 5초 초과"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ or $labels.app $labels.application }}&var-env=prod&from=now-15m&to=now"
          action: "1) HTTP RED 대시보드에서 느린 엔드포인트 특정  2) 로그에서 해당 시간대 slow query/timeout 확인  3) 개발팀에 병목 API 전달"
        noDataState: OK
        execErrState: Alerting

      # --- HikariCP Pending > 0 (high) ---
      - uid: hikari_pending
        title: HikariCP Pending Connections
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: hikaricp_connections_pending{env=~"prod|prod-k8s"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "{{ or $labels.app $labels.application }}({{ $labels.env }}) HikariCP 대기 커넥션 발생"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ or $labels.app $labels.application }}&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          action: "1) DB 커넥션 풀 사용량 확인 (active/idle/max)  2) MySQL 대시보드에서 slow query 확인  3) 커넥션 풀 크기 조정 또는 개발팀에 쿼리 최적화 요청"
        noDataState: OK
        execErrState: Alerting

      # --- GC Pause > 500ms (warning) ---
      - uid: gc_pause_high
        title: "GC Pause > 500ms"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: jvm_gc_pause_seconds_max{env=~"prod|prod-k8s"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ or $labels.app $labels.application }}({{ $labels.env }}) GC pause 500ms 초과"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app={{ or $labels.app $labels.application }}&var-env=prod&from=now-15m&to=now"
          action: "1) JVM 대시보드에서 힙 메모리 추이 확인  2) Old Gen 비율 확인 → 메모리 누수 여부 판단  3) 필요시 힙 덤프 또는 JVM 옵션 조정"
        noDataState: OK
        execErrState: Alerting

  # =========================================================================
  # Info — 참고용 알림 (prod + prod-k8s)
  # =========================================================================
  - orgId: 1
    name: Info
    folder: Info
    interval: 1m
    rules:
      # --- Service Restarted (info) ---
      # Docker(prod) 환경만 대상. K8s(prod-k8s)는 rolling update/HPA/liveness
      # restart가 정상이므로 k8s_container_restarts 룰이 커버
      - uid: service_restarted
        title: Service Restarted
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: changes(process_start_time_seconds{env="prod", app=~"api|chat"}[5m]) > 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "{{ or $labels.app $labels.job }}({{ $labels.instance }}) 서비스가 재시작됨"
        noDataState: OK
        execErrState: OK

      # --- Watchdog (info) — 모니터링 파이프라인 헬스체크 ---
      # 항상 firing. 멈추면 모니터링 파이프라인 자체 장애.
      # Discord #alert-normal에 12시간마다 반복 수신됨 → 안 오면 모니터링 죽은 것.
      - uid: watchdog
        title: Watchdog
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: vector(1)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "Watchdog alive — 모니터링 파이프라인 정상"
        noDataState: Alerting
        execErrState: Alerting

  # =========================================================================
  # SLO — SLI/SLO 정의서 기반 알림 (prod + prod-k8s)
  # =========================================================================
  - orgId: 1
    name: SLO
    folder: SLO
    interval: 1m
    rules:
      # --- SLO-1: API Error Budget Burn Rate (warning) ---
      # 1시간 burn rate > 5 = 1.4일 내 7일 Error Budget(0.5%) 소진 속도
      # SLI/SLO 정의서 §9.2: API 가용성은 burn rate 방식 권장
      - uid: slo1_error_budget_burn
        title: "SLO-1: API Error Budget Burn Rate High"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum(rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", app="api", status=~"5.."}[1h]))
                  /
                  sum(rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", app="api"}[1h]))
                )
                / 0.005
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API Error Budget 소진 속도 경고 — burn rate {{ $values.A.Value | printf \"%.1f\" }}x (1.4일 내 budget 소진 예상)"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=api&var-env=prod&var-level=ERROR&from=now-1h&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/error-budget-burn.md"
          action: "1) 최근 배포 이력 확인 (배포 직후 에러 급증인지)  2) 에러 집중 엔드포인트 특정  3) burn rate 지속 시 기능 배포 자제, 안정화 우선"
        noDataState: OK
        execErrState: Alerting

      # --- SLO-2: 핵심 API P95 Latency > 1s (warning) ---
      # 대상: /api/auth/**, /api/meetings/**, /api/users/me/meetings/**
      # AI 검증 API(/api/meeting-rounds/*/book-reports), 도서 검색(/api/books) 제외
      - uid: slo2_api_latency_p95
        title: "SLO-2: API P95 Latency > 1s"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.95,
                  sum by (le) (
                    rate(http_server_requests_seconds_bucket{
                      env=~"prod|prod-k8s",
                      app="api",
                      uri=~"/api/auth/.*|/api/meetings/.*|/api/users/me/meetings/.*"
                    }[5m])
                  )
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "핵심 API P95 응답시간 1초 초과 — {{ $values.A.Value | printf \"%.2f\" }}s"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=api&var-env=prod&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/api-latency-high.md"
          action: "1) HTTP RED 대시보드에서 느린 엔드포인트 특정  2) HikariCP pending connections 확인  3) MySQL slow query 확인  4) 외부 호출(카카오 OAuth 등) 타임아웃 확인"
        noDataState: OK
        execErrState: Alerting

      # --- SLO-3: Chat Probe 연속 실패 (critical) ---
      # 기존 probe_failure는 모든 probe 대상을 포함 → Chat 전용 룰 분리
      # probe 간격 15s, for:3m → 연속 12회 실패 시 발동
      # noDataState: OK — chat-health probe 타겟이 없는 환경에서 오보 방지
      - uid: slo3_chat_probe_failure
        title: "SLO-3: Chat Service Probe Failure"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: probe_success{env=~"prod|prod-k8s", instance=~".*chat-health.*"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Chat 서비스 프로브 연속 실패 — WebSocket/STOMP 채팅 전면 장애 가능"
          dashboard_url: "http://13.125.29.187:3000/d/infrastructure"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=chat&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/chat-probe-failure.md"
          action: "prod: docker ps | grep chat → 로그 확인 → docker restart chat / prod-k8s: kubectl get pods -n prod -l component=chat → kubectl logs"
        noDataState: OK
        execErrState: Alerting

      # --- SLO-4: 모임 가입 API 5xx (info) ---
      # 5분 내 5xx 3건 이상 → 트랜잭션 실패 패턴 감지
      # 저트래픽이므로 burn rate 불가, 절대 건수 threshold 사용
      - uid: slo4_participation_5xx
        title: "SLO-4: Participation API 5xx"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(increase(
                  http_server_requests_seconds_count{
                    env=~"prod|prod-k8s",
                    app="api",
                    uri=~"/api/meetings/.*/participations",
                    method="POST",
                    status=~"5.."
                  }[5m]
                )) or vector(0)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
              refId: C
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "모임 가입 API 5xx {{ $values.A.Value | printf \"%.0f\" }}건 발생 (5분 이내)"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=api&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          action: "1) traceId로 실패 요청 추적  2) DB 트랜잭션/lock 경합 여부 확인  3) 주간 리뷰에서 원인 분석"
        noDataState: OK
        execErrState: OK

      # --- Multi-Signal: Error Rate + Loki Error Logs (high) ---
      # 메트릭 조건(에러율 > 5%)과 로그 조건(ERROR 로그 > 10건/5분) 동시 충족 시 발동
      # 단일 시그널 대비 오보 최소화:
      #   - 메트릭만: scrape 지연/reset으로 인한 순간 에러율 스파이크 → 오보
      #   - 로그만: 정상 에러 로그(expected exception)로 인한 노이즈 → 오보
      #   - 둘 다 만족: 실제 서비스 영향이 있는 에러만 알림
      - uid: multisignal_error_rate_logs
        title: "Multi-Signal: Error Rate + Error Logs"
        condition: E
        data:
          # 메트릭: HTTP 5xx 에러율 (prod + prod-k8s)
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                max(
                  sum by (app) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", app=~"api|chat", status=~"5.."}[5m]))
                  /
                  sum by (app) (rate(http_server_requests_seconds_count{env=~"prod|prod-k8s", app=~"api|chat"}[5m]))
                )
              instant: true
              refId: A
          # 로그: Loki ERROR 레벨 로그 건수 (5분, prod only)
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: sum(count_over_time({app=~"api|chat", env=~"prod|prod-k8s", level="ERROR"}[5m]))
              queryType: instant
              refId: B
          # A를 단일 값으로 축소
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: C
          # B를 단일 값으로 축소
          - refId: D
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: B
              reducer: last
              refId: D
          # AND 조건: 에러율 > 5% && ERROR 로그 > 10건
          - refId: E
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$C > 0.05 && $D > 10"
              refId: E
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "에러율 + 에러 로그 동시 급증 — 에러율 {{ $values.C.Value | printf \"%.1f\" }}%, ERROR 로그 {{ $values.D.Value | printf \"%.0f\" }}건/5분"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=api&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          action: "1) 로그 대시보드에서 ERROR 로그 traceId 확인  2) 에러 집중 API 엔드포인트 특정  3) 최근 배포 이력 확인 → 롤백 판단"
        noDataState: OK
        execErrState: Alerting

  # =========================================================================
  # Custom Metrics — 커스텀 계측 메트릭 알림 (prod + prod-k8s)
  # =========================================================================
  - orgId: 1
    name: Custom Metrics
    folder: Custom Metrics
    interval: 1m
    rules:
      # --- Chat Message Latency P95 > 500ms (warning) ---
      # @Timed("chat.message.send") → chat_message_send_seconds_bucket
      # 메시지 처리(DB INSERT + 브로드캐스트)가 500ms 초과 시 사용자 체감 지연
      - uid: chat_message_latency_high
        title: "Chat Message P95 Latency > 500ms"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.95,
                  sum by (le) (
                    rate(chat_message_send_seconds_bucket{env=~"prod|prod-k8s"}[5m])
                  )
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "채팅 메시지 처리 P95 {{ $values.A.Value | printf \"%.0f\" }}ms — 사용자 체감 지연 발생"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=chat&var-env=prod&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/chat-message-latency-high.md"
          action: "1) MySQL 대시보드에서 slow query 확인 (메시지 INSERT)  2) JVM GC pause 확인  3) WebSocket 동시 접속 수 확인 (chat_ws_sessions_active)"
        noDataState: OK
        execErrState: Alerting

      # --- WebSocket Connect Failure Rate (warning) ---
      # Counter("chat.ws.connect") → chat_ws_connect_total{result=success|failure}
      # STOMP CONNECT 실패 = JWT 만료가 아닌 시스템 장애일 때 급증
      - uid: ws_connect_failure_rate
        title: "WebSocket Connect Failure Rate > 20%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(chat_ws_connect_total{env=~"prod|prod-k8s", result="failure"}[5m]))
                /
                sum(rate(chat_ws_connect_total{env=~"prod|prod-k8s"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.2]
              refId: C
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket 연결 실패율 {{ $values.A.Value | printf \"%.0f\" }}% — STOMP CONNECT 인증 또는 서버 장애"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=chat&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          action: "1) Chat 로그에서 CONNECT 실패 원인 확인 (JWT 검증 오류 vs 서버 장애)  2) JWT 토큰 갱신 정상 여부 확인  3) Chat 서버 리소스(CPU/메모리) 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Notification Delivery Failure Rate (warning) ---
      # Counter("notification.delivery") → notification_delivery_total{result=success|failure}
      # RabbitMQ consumer에서 SSE/FCM 전달 실패 급증 시
      - uid: notification_delivery_failure
        title: "Notification Delivery Failure Rate > 20%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(notification_delivery_total{env=~"prod|prod-k8s", result="failure"}[5m]))
                /
                sum(rate(notification_delivery_total{env=~"prod|prod-k8s"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.2]
              refId: C
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "알림 전달 실패율 {{ $values.A.Value | printf \"%.0f\" }}% — SSE/FCM 전달 장애"
          dashboard_url: "http://13.125.29.187:3000/d/application"
          log_url: "http://13.125.29.187:3000/d/logs?var-app=api&var-env=prod&var-level=ERROR&from=now-15m&to=now"
          runbook_url: "https://github.com/100-hours-a-week/5-team-service-cloud/blob/main/runbooks/alerting/notification-delivery-failure.md"
          action: "1) RabbitMQ DLQ(notification.delivery.dlq) 적재량 확인  2) FCM 토큰 유효성 확인 (만료/해제된 토큰 비율)  3) RabbitMQ 연결 상태 확인"
        noDataState: OK
        execErrState: Alerting

  # =========================================================================
  # Kubernetes — K8s 클러스터 상태 알림 (prod-k8s)
  # kube-state-metrics + cAdvisor 기반
  # =========================================================================
  - orgId: 1
    name: Kubernetes
    folder: Kubernetes
    interval: 1m
    rules:
      # --- Pod CrashLoopBackOff (critical) ---
      # kubernetes-mixin 표준: 15m. K8s backoff restart 주기(10s→5m)를 넘겨야 오보 방지
      - uid: k8s_crashloopbackoff
        title: "Pod CrashLoopBackOff"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                max_over_time(
                  kube_pod_container_status_waiting_reason{
                    namespace="prod",
                    reason="CrashLoopBackOff"
                  }[5m]
                ) >= 1
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.pod }}/{{ $labels.container }} CrashLoopBackOff — 컨테이너 반복 crash"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          log_url: "http://13.125.29.187:3000/d/logs?var-env=prod-k8s&var-level=ERROR&from=now-15m&to=now"
          action: "1) kubectl logs {{ $labels.pod }} -n prod --previous  2) OOM/설정오류/의존성 장애 확인  3) kubectl describe pod {{ $labels.pod }} -n prod"
        noDataState: OK
        execErrState: Alerting

      # --- Pod OOMKilled (critical) ---
      - uid: k8s_oomkilled
        title: "Pod OOMKilled"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                increase(
                  kube_pod_container_status_last_terminated_reason{
                    namespace="prod",
                    reason="OOMKilled"
                  }[10m]
                ) > 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.pod }}/{{ $labels.container }} OOMKilled — 메모리 제한 초과로 강제 종료"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl describe pod {{ $labels.pod }} -n prod → limits.memory 확인  2) JVM -Xmx vs 컨테이너 memory limit 비교  3) 메모리 누수 여부 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Node NotReady (critical) ---
      # kubernetes-mixin 표준: 15m. 네트워크 일시 문제로 잠깐 NotReady 가능
      - uid: k8s_node_not_ready
        title: "Node NotReady"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: kube_node_status_condition{condition="Ready", status="true"} == 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.node }} 노드 NotReady — 클러스터에서 이탈"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl get nodes  2) kubectl describe node {{ $labels.node }}  3) SSH → systemctl status kubelet  4) 디스크/메모리 압력 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Deployment Replicas Mismatch (high) ---
      # kubernetes-mixin 표준: 15m. 롤링 업데이트 중 일시적 mismatch 정상
      - uid: k8s_deployment_mismatch
        title: "Deployment Replicas Mismatch"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  kube_deployment_spec_replicas{namespace="prod"}
                  -
                  kube_deployment_status_replicas_available{namespace="prod"}
                ) > 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.deployment }} 레플리카 수 미달 — {{ $values.A.Value | printf \"%.0f\" }}개 부족"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl get deploy {{ $labels.deployment }} -n prod  2) kubectl get events -n prod --sort-by=.lastTimestamp  3) Pending/ImagePullBackOff 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Pod Pending (high) ---
      - uid: k8s_pod_pending
        title: "Pod Pending"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: kube_pod_status_phase{namespace="prod", phase="Pending"} > 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.pod }} 5분 이상 Pending — 스케줄링 불가"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl describe pod {{ $labels.pod }} -n prod → Events  2) Insufficient cpu/memory 확인  3) 노드 스케일아웃 필요 여부 판단"
        noDataState: OK
        execErrState: Alerting

      # --- HPA Maxed Out (warning) ---
      # kubernetes-mixin 표준: 15m. 일시적 트래픽 스파이크에 반응하지 않도록
      - uid: k8s_hpa_maxed
        title: "HPA Maxed Out"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                kube_horizontalpodautoscaler_status_current_replicas{namespace="prod"}
                ==
                kube_horizontalpodautoscaler_spec_max_replicas{namespace="prod"}
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.horizontalpodautoscaler }} HPA 최대치 도달 — 추가 스케일아웃 불가"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl get hpa -n prod  2) CPU 사용률 확인  3) max replicas 상향 또는 리소스 최적화 검토"
        noDataState: OK
        execErrState: Alerting

      # --- CoreDNS Down (critical) ---
      # 모든 CoreDNS Pod가 죽으면 K8s 서비스 디스커버리 전면 장애
      - uid: k8s_coredns_down
        title: "CoreDNS Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: kube_deployment_status_replicas_available{namespace="kube-system", deployment="coredns"} == 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CoreDNS 전체 다운 — K8s 서비스 디스커버리 불가"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          action: "1) kubectl -n kube-system get pods -l k8s-app=kube-dns  2) kubectl -n kube-system describe deploy coredns  3) 노드 상태 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Pod CPU Throttling (warning) ---
      # Pod CPU limit에 걸려 throttling 발생 → 레이턴시 저하. 노드 레벨에서는 감지 불가
      - uid: k8s_cpu_throttling
        title: "Pod CPU Throttling > 50%"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum by (pod, container, namespace) (
                  rate(container_cpu_cfs_throttled_periods_total{namespace="prod"}[5m])
                )
                /
                sum by (pod, container, namespace) (
                  rate(container_cpu_cfs_periods_total{namespace="prod"}[5m])
                ) > 0.5
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.pod }}/{{ $labels.container }} CPU throttling 50% 초과 — 응답 지연 발생 가능"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-pods"
          action: "1) kubectl top pod {{ $labels.pod }} -n prod  2) CPU limit 상향 검토  3) 앱 CPU 사용 패턴 확인"
        noDataState: OK
        execErrState: Alerting

      # --- Pod Memory Near Limit (warning) ---
      # OOMKill 전 선제 감지. 메모리 limit의 90% 초과 시 경고
      - uid: k8s_memory_near_limit
        title: "Pod Memory > 90% of Limit"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                container_memory_working_set_bytes{namespace="prod", container!=""}
                /
                kube_pod_container_resource_limits{namespace="prod", resource="memory"}
                > 0.9
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.pod }}/{{ $labels.container }} 메모리 limit 90% 초과 — OOMKill 위험"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-pods"
          action: "1) kubectl top pod {{ $labels.pod }} -n prod  2) JVM -Xmx 확인  3) memory limit 상향 또는 메모리 누수 점검"
        noDataState: OK
        execErrState: Alerting

      # --- Container Frequent Restarts (warning) ---
      - uid: k8s_container_restarts
        title: "Container Frequent Restarts"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(kube_pod_container_status_restarts_total{namespace="prod"}[10m]) > 2
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.pod }}/{{ $labels.container }} 10분 내 {{ $values.A.Value | printf \"%.0f\" }}회 재시작"
          dashboard_url: "http://13.125.29.187:3000/d/k8s-overview"
          log_url: "http://13.125.29.187:3000/d/logs?var-env=prod-k8s&from=now-15m&to=now"
          action: "1) kubectl logs {{ $labels.pod }} -n prod --previous  2) OOM/liveness probe 실패 확인  3) kubectl describe pod → Events"
        noDataState: OK
        execErrState: Alerting