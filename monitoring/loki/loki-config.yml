auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  query_timeout: 5m
  max_query_series: 5000
  retention_period: 30d
  # ingestion rate limit — 무제한 유입 방지 (K8s 연결 시 카디널리티 폭증 대비)
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 15MB

common:
  ring:
    instance_addr: 0.0.0.0
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: "2026-02-17"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
    - from: "2026-02-26"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  filesystem:
    directory: /loki/chunks
  aws:
    s3: s3://ap-northeast-2/doktori-monitoring-loki
    s3forcepathstyle: true

pattern_ingester:
  enabled: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: s3   # filesystem → s3: S3 백엔드에서 compactor가 정상 삭제하려면 s3 필요
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
