apiVersion: 1

prune: true

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
    version: 1
    editable: false

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: loki
    url: http://loki:3100
    isDefault: false
    jsonData:
      manageAlerts: true
    version: 1
    editable: false

  - name: CloudWatch
    type: cloudwatch
    access: proxy
    orgId: 1
    uid: cloudwatch
    jsonData:
      authType: default          # EC2 인스턴스 프로필 사용
      defaultRegion: ap-northeast-2
    version: 1
    editable: false
