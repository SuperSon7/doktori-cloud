# =============================================================================
# Debug / iperf3 Pods for same-node vs cross-node TCP checks
#
# 사용 예:
#   kubectl apply -f load-tests/k8s/debug-iperf3-pods.yaml
#   kubectl get pod -n prod -l app=doktori-debug -o wide
#   kubectl exec -n prod netshoot-b -- iperf3 -s
#   kubectl exec -n prod netshoot-a -- iperf3 -c <netshoot-b-pod-ip> -t 60 -P 4
#
# 참고:
# - prod namespace 는 default-deny ingress/egress 이므로 debug Pod 전용 NetworkPolicy 를 함께 둔다.
# - same-node / cross-node 비교는 apply 후 pod patch 또는 delete/recreate 로 배치를 조정한다.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: netshoot-a
  namespace: prod
  labels:
    app: doktori-debug
    component: iperf3
    instance: a
spec:
  restartPolicy: Never
  containers:
    - name: netshoot
      image: nicolaka/netshoot:latest
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Pod
metadata:
  name: netshoot-b
  namespace: prod
  labels:
    app: doktori-debug
    component: iperf3
    instance: b
spec:
  restartPolicy: Never
  containers:
    - name: netshoot
      image: nicolaka/netshoot:latest
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-debug-pod-traffic
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: doktori-debug
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: doktori-debug
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: doktori-debug
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
