---
# =============================================================================
# ECR Credential Provider Setup — kubelet-level ECR authentication
# Replaces ECR token refresh CronJob
# =============================================================================

- name: Set ECR credential provider variables
  set_fact:
    ecr_provider_version: "{{ ecr_credential_provider_version | default('v1.31.0') }}"
    ecr_provider_arch: "{{ ecr_credential_provider_arch | default('arm64') }}"
    ecr_provider_bin: "/usr/local/bin/ecr-credential-provider"
    ecr_provider_config: "/etc/kubernetes/ecr-credential-provider-config.yaml"

- name: Download ecr-credential-provider binary
  get_url:
    url: "https://artifacts.k8s.io/binaries/cloud-provider-aws/{{ ecr_provider_version }}/linux/{{ ecr_provider_arch }}/ecr-credential-provider-linux-{{ ecr_provider_arch }}"
    dest: "{{ ecr_provider_bin }}"
    mode: "0755"
  become: true

- name: Create credential provider config
  copy:
    dest: "{{ ecr_provider_config }}"
    mode: "0644"
    content: |
      apiVersion: kubelet.config.k8s.io/v1
      kind: CredentialProviderConfig
      providers:
        - name: ecr-credential-provider
          matchImages:
            - "*.dkr.ecr.*.amazonaws.com"
            - "*.dkr.ecr.*.amazonaws.com.cn"
            - "*.dkr.ecr-fips.*.amazonaws.com"
          defaultCacheDuration: "12h"
          apiVersion: credentialprovider.kubelet.k8s.io/v1
  become: true

- name: Check if kubelet flags already configured
  shell: grep -q image-credential-provider /var/lib/kubelet/kubeadm-flags.env
  register: kubelet_flags_check
  ignore_errors: true
  changed_when: false

- name: Add credential provider flags to kubelet
  lineinfile:
    path: /var/lib/kubelet/kubeadm-flags.env
    regexp: '^(KUBELET_KUBEADM_ARGS=".*)(")$'
    backrefs: true
    line: '\1 --image-credential-provider-config={{ ecr_provider_config }} --image-credential-provider-bin-dir=/usr/local/bin/\2'
  become: true
  when: kubelet_flags_check.rc != 0
  notify: restart kubelet

- name: Verify credential provider binary is executable
  stat:
    path: "{{ ecr_provider_bin }}"
  register: ecr_bin_stat

- name: Fail if binary not present
  fail:
    msg: "ecr-credential-provider binary not found at {{ ecr_provider_bin }}"
  when: not ecr_bin_stat.stat.exists or not ecr_bin_stat.stat.executable
