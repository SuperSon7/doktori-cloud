# =============================================================================
# SSM Parameter Store에서 시크릿 자동 fetch
# --extra-vars로 이미 값이 지정되어 있으면 SSM fetch 건너뜀
# =============================================================================

- name: Fetch Git PAT from SSM
  shell: >
    aws ssm get-parameter
    --name "{{ ssm_git_pat_key }}"
    --with-decryption
    --query "Parameter.Value"
    --output text
    --region {{ aws_region }}
  register: ssm_git_pat
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - fetch_secrets_from_ssm
    - git_pat | length == 0

- name: Set git_pat from SSM
  set_fact:
    git_pat: "{{ ssm_git_pat.stdout }}"
  when:
    - fetch_secrets_from_ssm
    - git_pat | length == 0
    - ssm_git_pat.rc == 0
    - ssm_git_pat.stdout | length > 0
  no_log: true

- name: Fetch Git username from SSM
  shell: >
    aws ssm get-parameter
    --name "{{ ssm_git_username_key }}"
    --with-decryption
    --query "Parameter.Value"
    --output text
    --region {{ aws_region }}
  register: ssm_git_username
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - fetch_secrets_from_ssm
    - git_username | length == 0

- name: Set git_username from SSM
  set_fact:
    git_username: "{{ ssm_git_username.stdout }}"
  when:
    - fetch_secrets_from_ssm
    - git_username | length == 0
    - ssm_git_username.rc == 0
    - ssm_git_username.stdout | length > 0
  no_log: true

- name: Fetch ArgoCD admin password from SSM
  shell: >
    aws ssm get-parameter
    --name "{{ ssm_argocd_password_key }}"
    --with-decryption
    --query "Parameter.Value"
    --output text
    --region {{ aws_region }}
  register: ssm_argocd_password
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - fetch_secrets_from_ssm
    - argocd_admin_password | length == 0

- name: Set argocd_admin_password from SSM
  set_fact:
    argocd_admin_password: "{{ ssm_argocd_password.stdout }}"
  when:
    - fetch_secrets_from_ssm
    - argocd_admin_password | length == 0
    - ssm_argocd_password.rc == 0
    - ssm_argocd_password.stdout | length > 0
  no_log: true

- name: Report secrets fetch status
  debug:
    msg:
      - "Git PAT: {{ 'SSM에서 가져옴' if (ssm_git_pat is defined and ssm_git_pat.rc | default(1) == 0) else ('extra-vars로 지정됨' if git_pat | length > 0 else '미설정 — ArgoCD Git 연결 건너뜀') }}"
      - "Git Username: {{ 'SSM에서 가져옴' if (ssm_git_username is defined and ssm_git_username.rc | default(1) == 0) else ('extra-vars로 지정됨' if git_username | length > 0 else '미설정') }}"
      - "ArgoCD Password: {{ '설정됨' if argocd_admin_password | length > 0 else '미설정 — 초기 비밀번호 유지' }}"