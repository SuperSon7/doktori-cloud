# =============================================================================
# 워크로드 배포 — deploy-workloads.sh 대응
# =============================================================================

- name: Create namespace
  command: kubectl create namespace {{ k8s_namespace }}
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: ns_result
  changed_when: "'created' in ns_result.stdout"
  failed_when: false

- name: Create ECR imagePullSecret
  shell: |
    ECR_TOKEN=$(aws ecr get-login-password --region {{ aws_region }})
    kubectl delete secret ecr-credentials -n {{ k8s_namespace }} --ignore-not-found
    kubectl create secret docker-registry ecr-credentials \
      --namespace={{ k8s_namespace }} \
      --docker-server={{ ecr_registry }} \
      --docker-username=AWS \
      --docker-password="${ECR_TOKEN}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  no_log: true

- name: Create Firebase Secret from SSM
  shell: |
    set -e
    SSM_KEY="/{{ project_name }}/{{ k8s_namespace }}/FIREBASE_SERVICE_ACCOUNT"

    if kubectl get crd externalsecrets.external-secrets.io &>/dev/null && \
       kubectl get clustersecretstore aws-parameter-store &>/dev/null; then
      cat <<EOF | kubectl apply -f -
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: firebase-credentials
      namespace: {{ k8s_namespace }}
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: aws-parameter-store
        kind: ClusterSecretStore
      target:
        name: firebase-credentials
        creationPolicy: Owner
      data:
        - secretKey: firebase-service-account.json
          remoteRef:
            key: ${SSM_KEY}
    EOF

      for i in $(seq 1 30); do
        if kubectl get secret firebase-credentials -n {{ k8s_namespace }} &>/dev/null; then
          echo "external_secret_ready"
          exit 0
        fi
        sleep 2
      done
    fi

    for i in $(seq 1 20); do
      FIREBASE_JSON=$(aws ssm get-parameter \
        --name "${SSM_KEY}" \
        --with-decryption --query "Parameter.Value" --output text \
        --region {{ aws_region }} 2>/dev/null) && break
      sleep 3
    done

    if [ -z "${FIREBASE_JSON:-}" ]; then
      echo "ssm_not_found"
      exit 0
    fi

    TMP_FILE=$(mktemp)
    trap 'rm -f "${TMP_FILE}"' EXIT
    printf '%s' "${FIREBASE_JSON}" > "${TMP_FILE}"
    kubectl create secret generic firebase-credentials \
      --namespace={{ k8s_namespace }} \
      --from-file=firebase-service-account.json="${TMP_FILE}" \
      --dry-run=client -o yaml | kubectl apply -f -
    echo "secret_reconciled"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: firebase_result
  changed_when: "'external_secret_ready' in firebase_result.stdout or 'secret_reconciled' in firebase_result.stdout"
  no_log: true

- name: Fail if Firebase Secret not available
  fail:
    msg: >
      Firebase Secret을 생성하지 못했습니다 (SSM 파라미터 없음).
      FCM 푸시 알림이 동작하지 않습니다.
      건너뛰려면: --extra-vars 'skip_firebase=true'
  when:
    - firebase_result.stdout is defined
    - "'ssm_not_found' in firebase_result.stdout"
    - not (skip_firebase | default(false) | bool)

- name: Verify Firebase Secret is present
  command: kubectl get secret firebase-credentials -n {{ k8s_namespace }}
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: false

- name: Apply workload manifests
  command: kubectl apply -f {{ k8s_scripts_dir }}/manifests/workloads/
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: workloads_apply
  changed_when: "'configured' in workloads_apply.stdout or 'created' in workloads_apply.stdout"

- name: Wait for api pods ready
  command: >
    kubectl wait --for=condition=Ready pod
    -l app=doktori,component=api
    -n {{ k8s_namespace }}
    --timeout=180s
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: api_wait
  failed_when: api_wait.rc != 0 and 'timed out' not in api_wait.stderr

- name: Wait for chat pods ready
  command: >
    kubectl wait --for=condition=Ready pod
    -l app=doktori,component=chat
    -n {{ k8s_namespace }}
    --timeout=180s
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: chat_wait
  failed_when: chat_wait.rc != 0 and 'timed out' not in chat_wait.stderr

- name: Show workload pods
  command: kubectl get pods -n {{ k8s_namespace }} -o wide
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: pods_result
  changed_when: false

- name: Display pods
  debug:
    msg: "{{ pods_result.stdout_lines }}"
