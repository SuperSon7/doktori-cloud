# 1. default-deny — 모든 인바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2. NGF → api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ngf-to-api
  namespace: prod
spec:
  podSelector:
    matchLabels:
      component: api
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - port: 8080
          protocol: TCP
---
# 3. NGF → chat
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ngf-to-chat
  namespace: prod
spec:
  podSelector:
    matchLabels:
      component: chat
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - port: 8081
          protocol: TCP
---
# 4. Alloy(monitoring ns) → api/chat 메트릭 수집
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-to-apps
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: doktori
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
---
# 5. Actuator 보호 전략 참고:
#   NetworkPolicy는 L3/L4 (IP/port) 필터링만 가능 → URL path 차단 불가
#   Actuator 접근 제한은 Spring Boot에서 처리:
#     - prometheus/health/info만 expose (나머지 404 자동 반환)
#     - Alloy가 클러스터 내부에서 직접 스크래핑 (policy #4에서 허용)
#   외부 접근 시: ALB → NGF(/api/* catch-all) → api-svc → Spring Boot가 응답 제한
---
# 6. monitoring namespace — default-deny + Alloy 필수 통신 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 6. kube-state-metrics → Alloy 스크래핑 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alloy-to-kube-state-metrics
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: alloy
      ports:
        - port: 8080
          protocol: TCP