# 1. default-deny — 모든 인바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2. NGF → api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ngf-to-api
  namespace: prod
spec:
  podSelector:
    matchLabels:
      component: api
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - port: 8080
          protocol: TCP
---
# 3. NGF → chat
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ngf-to-chat
  namespace: prod
spec:
  podSelector:
    matchLabels:
      component: chat
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - port: 8081
          protocol: TCP
---
# 4. Alloy(monitoring ns) → api/chat 메트릭 수집
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-to-apps
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: doktori
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
---
# 5. Actuator 보호 전략 참고:
#   NetworkPolicy는 L3/L4 (IP/port) 필터링만 가능 → URL path 차단 불가
#   Actuator 접근 제한은 Spring Boot에서 처리:
#     - prometheus/health/info만 expose (나머지 404 자동 반환)
#     - Alloy가 클러스터 내부에서 직접 스크래핑 (policy #4에서 허용)
#   외부 접근 시: ALB → NGF(/api/* catch-all) → api-svc → Spring Boot가 응답 제한
---
# 6. monitoring namespace — default-deny + Alloy 필수 통신 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 6. kube-state-metrics → Alloy 스크래핑 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alloy-to-kube-state-metrics
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: alloy
      ports:
        - port: 8080
          protocol: TCP
---
# ============================================================
# Egress Policies
# ============================================================

# 7. default-deny-egress — prod namespace 전체 아웃바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# 7-1. IMDS Egress 허용 — EC2 Instance Metadata (IAM credentials)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-imds-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - port: 80
          protocol: TCP
---
# 8. DNS Egress 허용 — prod namespace 모든 Pod → kube-dns:53
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# 9. api → 같은 namespace 내 통신 + VPC 내부 AWS 서비스
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      component: api
  policyTypes:
    - Egress
  egress:
    # 같은 namespace 내 Pod 통신 (api ↔ chat)
    - to:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
    # RDS MySQL
    - to:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 3306
          protocol: TCP
    # Redis
    - to:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 6379
          protocol: TCP
    # RabbitMQ
    - to:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 5672
          protocol: TCP
    # MongoDB
    - to:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 27017
          protocol: TCP
    # AWS VPC Endpoints (SSM, ECR, CloudWatch Logs 등)
    - to:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 443
          protocol: TCP
---
