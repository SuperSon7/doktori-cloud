# ExternalSecret — Firebase Service Account JSON
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: firebase-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: firebase-credentials
    creationPolicy: Owner
  data:
    - secretKey: firebase-service-account.json
      remoteRef:
        key: /doktori/prod/FIREBASE_SERVICE_ACCOUNT
