# =============================================================================
# FI-17: Calico (CNI) 네트워크 플러그인 장애
#
# 가설: Calico DaemonSet Pod가 특정 노드에서 죽으면
#       해당 노드의 Pod 네트워킹이 불안정해질 수 있다.
#       다른 노드의 Calico는 정상이므로 전체 클러스터 통신은 유지.
#
# 왜 하는가:
#   Calico는 k8s 네트워킹의 근간이다. iptables 규칙과 VXLAN 터널을 관리한다.
#   Calico Pod가 죽으면 해당 노드에서 새로운 Pod의 네트워크 설정이 안 될 수 있다.
#   기존 Pod의 통신은 유지되는지, DaemonSet이 자동 재시작하는지 확인.
#
# ⚠️ 주의: CNI 장애는 해당 노드의 모든 Pod에 영향 가능.
#    반드시 다른 FI 성공 후 마지막에 실행.
#
# 성공 기준:
#   - Calico Pod 재시작 < 30초 (DaemonSet 자동 복구)
#   - 기존 Pod 통신 유지 (iptables 규칙 이미 적용됨)
#   - 서비스 SLO-1 영향 없음
#
# 관측:
#   kubectl get pods -n calico-system -w (또는 kube-system)
#   kubectl exec <api-pod> -- curl -s chat-svc:8081/api/actuator/health
# =============================================================================
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: fi-17-calico-kill
  namespace: chaos-testing
  labels:
    experiment: fi-17
    target: calico
spec:
  action: pod-kill
  mode: fixed
  value: '1'
  selector:
    namespaces:
      - calico-system
    labelSelectors:
      k8s-app: calico-node
  gracePeriod: 0
  duration: '30s'