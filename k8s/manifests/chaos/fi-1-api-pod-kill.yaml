# =============================================================================
# FI-1: API Pod 강제 종료
#
# 가설: API Pod 1개가 죽어도 k8s self-healing + HPA로 SLO-1 (99.5%) 유지
# 성공 기준: 5xx < 30초, Pod 재시작 < 60초
# 관측: Grafana → http-red 대시보드, HPA replicas
# =============================================================================
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: fi-1-api-pod-kill
  namespace: chaos-testing
  labels:
    experiment: fi-1
    target: api
spec:
  action: pod-kill
  mode: fixed-percent
  value: '50'
  selector:
    namespaces:
      - prod
    labelSelectors:
      app: doktori
      component: api
  gracePeriod: 0
  duration: '30s'