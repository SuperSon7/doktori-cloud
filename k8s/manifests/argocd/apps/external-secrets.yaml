# ArgoCD Application — External Secrets (sync-wave: 0, 워크로드보다 먼저)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doktori-external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/5-team-service-cloud.git
    targetRevision: main
    path: k8s/manifests/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
