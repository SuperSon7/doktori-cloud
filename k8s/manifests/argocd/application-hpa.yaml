# ArgoCD Application — HPA (k8s/manifests/hpa/ 폴더 감시)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doktori-hpa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/5-team-service-cloud.git
    targetRevision: main
    path: k8s/manifests/hpa
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
