# ArgoCD Application — monitoring (k8s/manifests/monitoring/ 폴더 감시)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doktori-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/5-team-service-cloud.git
    targetRevision: main
    path: k8s/manifests/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
