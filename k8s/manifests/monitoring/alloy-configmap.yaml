apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // =============================================================
    // 1. Spring Boot Actuator 메트릭 (K8s Service Discovery)
    // =============================================================
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["prod"]
      }
    }

    discovery.relabel "spring_pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        regex         = "doktori"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        target_label  = "component"
      }
      // component → app 매핑: 기존 대시보드/알림이 app 라벨로 쿼리하므로 호환 유지
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        regex         = "api"
        replacement   = "/api/actuator/prometheus"
        target_label  = "__metrics_path__"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        regex         = "chat"
        replacement   = "/api/actuator/prometheus"
        target_label  = "__metrics_path__"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_label_component"]
        separator     = ":"
        regex         = "(.*):api"
        replacement   = "${1}:8080"
        target_label  = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_label_component"]
        separator     = ":"
        regex         = "(.*):chat"
        replacement   = "${1}:8081"
        target_label  = "__address__"
      }
      // component → instance 매핑: EC2 환경과 동일한 instance 라벨 유지
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        target_label  = "instance"
      }
      rule {
        replacement  = "prod"
        target_label = "env"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
    }

    prometheus.scrape "spring_apps" {
      targets    = discovery.relabel.spring_pods.output
      forward_to = [prometheus.remote_write.monitoring.receiver]
      scrape_interval = "15s"
    }

    // =============================================================
    // 2. kube-state-metrics
    // =============================================================
    prometheus.scrape "kube_state" {
      targets = [{
        __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
      }]
      forward_to = [prometheus.relabel.kube_state_env.receiver]
      scrape_interval = "30s"
    }

    prometheus.relabel "kube_state_env" {
      forward_to = [prometheus.remote_write.monitoring.receiver]
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    // =============================================================
    // 3. kubelet cAdvisor (컨테이너 리소스)
    // =============================================================
    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        replacement  = "/metrics/cadvisor"
        target_label = "__metrics_path__"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    prometheus.scrape "cadvisor" {
      targets    = discovery.relabel.cadvisor.output
      forward_to = [prometheus.remote_write.monitoring.receiver]
      scrape_interval = "30s"
      scheme     = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        insecure_skip_verify = true
      }
    }

    // =============================================================
    // 4. 호스트 메트릭
    // =============================================================
    prometheus.exporter.unix "host" {
      set_collectors = ["cpu", "meminfo", "diskstats", "filesystem", "loadavg", "netdev"]
    }

    prometheus.scrape "host_metrics" {
      targets    = prometheus.exporter.unix.host.targets
      forward_to = [prometheus.relabel.host_env.receiver]
      scrape_interval = "30s"
    }

    prometheus.relabel "host_env" {
      forward_to = [prometheus.remote_write.monitoring.receiver]
      rule {
        replacement  = "prod"
        target_label = "env"
      }
      rule {
        replacement  = env("NODE_NAME")
        target_label = "node"
      }
      rule {
        replacement  = env("NODE_NAME")
        target_label = "instance"
      }
    }

    // =============================================================
    // 5. CoreDNS 메트릭
    // =============================================================
    prometheus.scrape "coredns" {
      targets = [{
        __address__ = "kube-dns.kube-system.svc.cluster.local:9153",
      }]
      forward_to = [prometheus.relabel.coredns_env.receiver]
      scrape_interval = "30s"
    }

    prometheus.relabel "coredns_env" {
      forward_to = [prometheus.remote_write.monitoring.receiver]
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    // =============================================================
    // 6. API Server 메트릭
    // =============================================================
    prometheus.scrape "apiserver" {
      targets = [{
        __address__ = "kubernetes.default.svc.cluster.local:443",
      }]
      forward_to = [prometheus.relabel.apiserver_env.receiver]
      scrape_interval = "60s"
      scheme     = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        insecure_skip_verify = true
      }
    }

    prometheus.relabel "apiserver_env" {
      forward_to = [prometheus.remote_write.monitoring.receiver]
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    // =============================================================
    // 7. remote_write → Prometheus
    // =============================================================
    prometheus.remote_write "monitoring" {
      endpoint {
        url = "http://monitoring.mgmt.doktori.internal:9090/api/v1/write"
        queue_config {
          capacity             = 10000
          max_shards           = 5
          max_samples_per_send = 2000
        }
      }
      wal {
        truncate_frequency = "2h"
        max_keepalive_time = "8h"
      }
    }

    // =============================================================
    // 8. 로그 → Loki
    // =============================================================

    // prod namespace 로그
    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.loki_pods.output
      forward_to = [loki.process.pipeline.receiver]
    }

    discovery.relabel "loki_pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        target_label  = "component"
      }
      // component → app 매핑: 로그 쿼리 {app="api"} 호환
      rule {
        source_labels = ["__meta_kubernetes_pod_label_component"]
        target_label  = "app"
      }
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    // kube-system namespace 로그 (CoreDNS, kube-proxy 등 디버깅용)
    discovery.kubernetes "kube_system_pods" {
      role = "pod"
      namespaces {
        names = ["kube-system"]
      }
    }

    discovery.relabel "loki_kube_system" {
      targets = discovery.kubernetes.kube_system_pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        replacement  = "prod"
        target_label = "env"
      }
    }

    loki.source.kubernetes "kube_system" {
      targets    = discovery.relabel.loki_kube_system.output
      forward_to = [loki.process.pipeline.receiver]
    }

    loki.process "pipeline" {
      stage.json {
        expressions = {
          level   = "level",
          message = "message",
          traceId = "traceId",
        }
      }
      stage.labels {
        values = {
          level = "",
        }
      }
      // traceId는 고카디널리티 → label이 아닌 structured metadata로 저장
      // Loki 3.x+ 필요, limits_config.allow_structured_metadata: true
      stage.structured_metadata {
        values = {
          trace_id = "traceId",
        }
      }
      forward_to = [loki.write.monitoring.receiver]
    }

    // =============================================================
    // 9. Kubernetes Events → Loki
    // =============================================================
    loki.source.kubernetes_events "events" {
      namespaces = ["prod", "kube-system", "monitoring"]
      forward_to = [loki.process.k8s_events.receiver]
    }

    loki.process "k8s_events" {
      stage.static_labels {
        values = {
          env    = "prod",
          source = "k8s-events",
        }
      }
      forward_to = [loki.write.monitoring.receiver]
    }

    loki.write "monitoring" {
      endpoint {
        url = "http://monitoring.mgmt.doktori.internal:3100/loki/api/v1/push"
      }
    }