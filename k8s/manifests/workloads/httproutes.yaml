# WebSocket — /ws/chat → rewrite /api/ws
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-ws-route
  namespace: prod
spec:
  parentRefs:
    - name: doktori-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ws/chat
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/ws
      timeouts:
        backendRequest: "1h"
      backendRefs:
        - name: chat-svc
          port: 8081
---
# chat REST API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-api-route
  namespace: prod
spec:
  parentRefs:
    - name: doktori-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/chat/
      timeouts:
        backendRequest: "1h"
      backendRefs:
        - name: chat-svc
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /api/chat-rooms/
      timeouts:
        backendRequest: "75s"
      backendRefs:
        - name: chat-svc
          port: 8081
---
# api REST API (catch-all /api/)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: prod
spec:
  parentRefs:
    - name: doktori-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      timeouts:
        backendRequest: "30s"
      backendRefs:
        - name: api-svc
          port: 8080