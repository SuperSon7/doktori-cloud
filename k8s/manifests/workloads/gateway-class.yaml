# GatewayClass — NGF가 설치 시 자동 생성하지만,
# NginxProxy 참조를 위해 명시적으로 선언
# parametersRef로 NginxProxy 설정을 연결
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: nginx
spec:
  controllerName: gateway.nginx.org/nginx-gateway-controller
  parametersRef:
    group: gateway.nginx.org
    kind: NginxProxy
    name: doktori-proxy-config