apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: prod
  labels:
    app: doktori
    component: chat
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: doktori
      component: chat
  template:
    metadata:
      labels:
        app: doktori
        component: chat
    spec:
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doktori
              component: chat
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doktori
              component: chat
      containers:
        - name: chat
          image: 250857930609.dkr.ecr.ap-northeast-2.amazonaws.com/doktori/prod-backend-chat:ae8ecb9
          ports:
            - containerPort: 8081
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # CPU limit 제거: throttling 방지, 노드 여유 CPU 활용
          # API Pod와 동일하게 memory limit만 설정
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              memory: "1536Mi"
          env:
            - name: TZ
              value: Asia/Seoul
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            periodSeconds: 30
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
      volumes:
        - name: tmp
          emptyDir: {}
