apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: prod
  labels:
    app: doktori
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: doktori
      component: api
  template:
    metadata:
      labels:
        app: doktori
        component: api
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doktori
              component: api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doktori
              component: api
      containers:
        - name: api
          image: 250857930609.dkr.ecr.ap-northeast-2.amazonaws.com/doktori/prod-backend-api:ae8ecb9
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              memory: "1280Mi"
          env:
            - name: TZ
              value: Asia/Seoul
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: FIREBASE_CREDENTIALS_PATH
              value: "file:/app/secrets/firebase-service-account.json"
          volumeMounts:
            - name: firebase-cred
              mountPath: /app/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
      volumes:
        - name: firebase-cred
          secret:
            secretName: firebase-credentials
            optional: true
        - name: tmp
          emptyDir: {}
