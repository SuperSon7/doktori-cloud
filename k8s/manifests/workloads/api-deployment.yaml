apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: prod
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: doktori
      component: api
  template:
    metadata:
      labels:
        app: doktori
        component: api
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: doktori
              component: api
      containers:
        - name: api
          image: 250857930609.dkr.ecr.ap-northeast-2.amazonaws.com/doktori/prod-backend-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              memory: "1280Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: FIREBASE_CREDENTIALS_PATH
              value: "file:/app/secrets/firebase-service-account.json"
          volumeMounts:
            - name: firebase-cred
              mountPath: /app/secrets
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
      volumes:
        - name: firebase-cred
          secret:
            secretName: firebase-credentials
            optional: true