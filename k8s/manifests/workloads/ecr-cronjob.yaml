apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-manager
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher-binding
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: prod
roleRef:
  kind: Role
  name: ecr-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: prod
spec:
  schedule: "0 */10 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresher
          containers:
            - name: refresh
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  ECR_TOKEN=$(aws ecr get-login-password --region ap-northeast-2)
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  API_SERVER="https://kubernetes.default.svc"
                  SECRET_NAME="ecr-credentials"
                  NS="prod"

                  curl -s -k -X DELETE "${API_SERVER}/api/v1/namespaces/${NS}/secrets/${SECRET_NAME}" \
                    -H "Authorization: Bearer ${TOKEN}" || true

                  DOCKER_CONFIG=$(echo -n "{\"auths\":{\"250857930609.dkr.ecr.ap-northeast-2.amazonaws.com\":{\"username\":\"AWS\",\"password\":\"${ECR_TOKEN}\"}}}" | base64 -w 0)
                  curl -s -k -X POST "${API_SERVER}/api/v1/namespaces/${NS}/secrets" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"apiVersion\": \"v1\",
                      \"kind\": \"Secret\",
                      \"metadata\": {\"name\": \"${SECRET_NAME}\", \"namespace\": \"${NS}\"},
                      \"type\": \"kubernetes.io/dockerconfigjson\",
                      \"data\": {\".dockerconfigjson\": \"${DOCKER_CONFIG}\"}
                    }"
                  echo "ECR token refreshed"
          restartPolicy: OnFailure