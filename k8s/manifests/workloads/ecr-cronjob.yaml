apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-manager
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher-binding
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: prod
roleRef:
  kind: Role
  name: ecr-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: prod
spec:
  schedule: "0 */10 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresher
          containers:
            - name: refresh
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  SECRET_NAME="ecr-credentials"
                  NS="prod"
                  ECR_REGISTRY="250857930609.dkr.ecr.ap-northeast-2.amazonaws.com"

                  # kubectl 설치
                  echo "[1/3] Installing kubectl..."
                  KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
                  curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/arm64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/
                  echo "kubectl ${KUBECTL_VERSION} installed"

                  # ECR 토큰 발급
                  echo "[2/3] Fetching ECR token..."
                  ECR_TOKEN=$(aws ecr get-login-password --region ap-northeast-2)
                  if [ -z "${ECR_TOKEN}" ]; then
                    echo "ERROR: Failed to get ECR token"
                    exit 1
                  fi
                  echo "ECR token obtained (length: ${#ECR_TOKEN})"

                  # kubectl로 Secret 생성/업데이트
                  echo "[3/3] Updating secret ${SECRET_NAME}..."
                  kubectl create secret docker-registry "${SECRET_NAME}" \
                    --namespace="${NS}" \
                    --docker-server="${ECR_REGISTRY}" \
                    --docker-username=AWS \
                    --docker-password="${ECR_TOKEN}" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "ECR token refreshed successfully"
          restartPolicy: OnFailure