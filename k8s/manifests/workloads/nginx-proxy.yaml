# NginxProxy — NGF 전역 프록시 설정
#
# GatewayClass에서 parametersRef로 참조해야 적용됨
# 역할:
#   1. ALB가 X-Forwarded-For에 추가한 클라이언트 IP를 NGF가 신뢰
#   2. Upstream keepalive로 connection 재사용 (TCP 핸드셰이크 절약)
#
# CS 배경:
#   X-Forwarded-For: L7 프록시 체인에서 원본 클라이언트 IP를 전달하는 de facto 표준 헤더
#   Keepalive: HTTP/1.1 persistent connection — 매 요청마다 새 TCP 연결을 맺지 않고
#              기존 연결을 재사용 → 3-way handshake 오버헤드 제거, latency 감소
apiVersion: gateway.nginx.org/v1alpha2
kind: NginxProxy
metadata:
  name: doktori-proxy-config
spec:
  rewriteClientIP:
    mode: XForwardedFor
    setIPRecursively: false
    trustedAddresses:
      - type: CIDR
        value: "10.0.0.0/8"
  upstream:
    keepAlive:
      connections: 64
      requests: 1000
      time: "1h"