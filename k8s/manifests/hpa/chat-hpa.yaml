apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-hpa
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat
  minReplicas: 2
  maxReplicas: 4
  metrics:
    # 1순위: WebSocket 세션 수 (Prometheus Adapter 경유)
    # Adapter 장애 시 HPA는 이 메트릭을 무시하고 2순위로 fallback
    - type: Pods
      pods:
        metric:
          name: chat_ws_sessions_active
        target:
          type: AverageValue
          averageValue: "50"
    # 2순위: Memory — Adapter 없이도 metrics-server로 동작 (fallback)
    # WebSocket 세션이 많아지면 힙도 올라가므로 간접 지표로 유효
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60